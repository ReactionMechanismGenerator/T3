# Plug flow reactor (PFR) example
#
# An isothermal, isobaric flow reactor (a Lagrangian parcel of gas advected
# at constant T and P) is simulated with the CanteraPFR adapter.  The PFR
# discretization is controlled by module-level constants in
# t3/simulate/cantera_pfr.py (LENGTH, AREA, N_CELLS); the residence time
# is taken from the reactor entry's termination_time.

project: pfr_example

t3:
  options:
    max_T3_iterations: 5
    max_RMG_walltime: '00:00:10:00'
  sensitivity:
    adapter: CanteraPFR
    atol: 1e-6
    rtol: 1e-4
    SA_threshold: 0.01
    top_SA_species: 10
    top_SA_reactions: 10

rmg:
  database:
    thermo_libraries:
      - primaryThermoLibrary
      - BurkeH2O2
    kinetics_libraries:
      - BurkeH2O2inN2
  species:
    - label: H2
      smiles: '[H][H]'
      concentration: 0.67
    - label: O2
      smiles: '[O][O]'
      concentration: 0.33
    - label: OH
      smiles: '[OH]'
      SA_observable: true
    - label: H
      smiles: '[H]'
      SA_observable: true
  reactors:
    - type: gas batch constant T P
      T: 1000
      P: 1
      termination_conversion:
        H2: 0.9
      termination_time: [1, 's']    # PFR residence time
  model:
    core_tolerance: [0.01, 0.005, 0.001]

qm:
  adapter: ARC
  level_of_theory: b3lyp/6-31g(d,p)
  job_types:
    rotors: false
    fine: false
    freq: true
    opt: true
    sp: true
