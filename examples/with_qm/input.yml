# Full T3 iterative workflow: RMG model generation + QM refinement
#
# This example shows the core T3 use case: iteratively generating a
# kinetic model with RMG, identifying uncertain parameters via
# sensitivity analysis, and refining them with quantum mechanical
# calculations using ARC.
#
# The adaptive_levels feature selects the level of theory based on
# the number of heavy atoms in each species, balancing accuracy
# and computational cost.

project: ethane_oxidation_with_qm

t3:
  options:
    max_T3_iterations: 10
    max_RMG_walltime: '00:00:15:00'
  sensitivity:
    adapter: CanteraConstantTP
    SA_threshold: 0.01
    top_SA_species: 10
    top_SA_reactions: 10

rmg:
  database:
    thermo_libraries:
      - primaryThermoLibrary
      - BurkeH2O2
      - DFT_QCI_thermo
      - CBS_QB3_1dHR
    kinetics_libraries:
      - BurkeH2O2inN2
  species:
    - label: ethane
      smiles: CC
      concentration: 0.05
    - label: O2
      smiles: '[O][O]'
      concentration: 0.20
    - label: N2
      smiles: N#N
      concentration: 0.75
      balance: true
    - label: OH
      smiles: '[OH]'
      SA_observable: true
    - label: CH2O
      smiles: C=O
      SA_observable: true
  reactors:
    - type: gas batch constant T P
      T: 1200
      P: 1
      termination_conversion:
        ethane: 0.5
      termination_time: [2, 's']
  model:
    core_tolerance: [0.05, 0.01, 0.005, 0.001]
  species_constraints:
    max_C_atoms: 4
    max_O_atoms: 4
    max_N_atoms: 0
    max_Si_atoms: 0
    max_S_atoms: 0
    max_heavy_atoms: 8
    max_radical_electrons: 2

qm:
  adapter: ARC
  adaptive_levels:
    (1, 6):
      opt_level: wb97xd/def2tzvp
      sp_level: ccsd(t)-f12/aug-cc-pvtz-f12
    (7, 14):
      conformer_level:
        method: wb97xd
        basis: def2svp
      opt_level:
        method: wb97xd
        basis: def2tzvp
      sp_level:
        method: dlpno-ccsd(T)
        basis: def2-tzvp
        auxiliary_basis: def2-tzvp/c
    (15, 'inf'):
      opt_level: wb97xd/def2svp
  job_types:
    rotors: true
    conformers: true
    fine: true
    freq: true
    opt: true
    sp: true
