# Plug flow reactor (PFR) with prescribed axial temperature profile
#
# Non-isothermal, isobaric flow reactor.  A Lagrangian parcel of gas is
# advected through N_CELLS axial segments and the gas temperature at every
# segment is taken from a hard-coded T(z) profile (energy equation OFF).
#
# This is the right adapter when the wall temperature of a flow tube has
# been *measured* and you want the chemistry to evolve under that imposed
# schedule -- i.e. the prescribed-temperature ("Scenario A") version of a
# non-isothermal PFR.
#
# Geometry, the breakpoints, and the profile shape are set by module-level
# constants in t3/simulate/cantera_pfr_t_profile.py.  The defaults model an
# 80 cm reactor with a smooth (raised-cosine) ramp from 300 K to 900 K over
# the first 20 cm, an isothermal plateau at 900 K for the next 40 cm, and a
# smooth ramp back down to 500 K over the last 20 cm.  Advanced users edit
# the constants (or the body of `temperature_profile`) to match their own
# experimental T(z), or copy the file as the basis for a brand-new adapter.
#
# Sensitivity analysis IS supported.  Because the reactor is steady-state in
# the lab frame, the SA coefficients are returned as a function of axial
# position z rather than time -- get_sa_coefficients() adds a 'distance' key
# to the standard sa_dict carrying the cell-center positions [m].

project: pfr_t_profile_example

t3:
  options:
    max_T3_iterations: 5
    max_RMG_walltime: '00:00:10:00'
  sensitivity:
    adapter: CanteraPFRTProfile
    atol: 1e-6
    rtol: 1e-4
    SA_threshold: 0.01
    top_SA_species: 10
    top_SA_reactions: 10

rmg:
  database:
    thermo_libraries:
      - primaryThermoLibrary
      - BurkeH2O2
    kinetics_libraries:
      - BurkeH2O2inN2
  species:
    - label: H2
      smiles: '[H][H]'
      concentration: 0.67
    - label: O2
      smiles: '[O][O]'
      concentration: 0.33
    - label: OH
      smiles: '[OH]'
      SA_observable: true
    - label: H
      smiles: '[H]'
      SA_observable: true
  reactors:
    - type: gas batch constant T P
      T: 900                          # inlet temperature for the underlying RMG run
      P: 1                            # bar
      termination_conversion:
        H2: 0.9
      termination_time: [5, 's']      # nominal total residence time used by the adapter
                                      # to back out a constant inlet mass flow rate
  model:
    core_tolerance: [0.01, 0.005, 0.001]

qm:
  adapter: ARC
  level_of_theory: b3lyp/6-31g(d,p)
  job_types:
    rotors: false
    fine: false
    freq: true
    opt: true
    sp: true
